<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фото-баннер</title>
    <style>
        /* Обнуляем базовые отступы */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Контейнер баннера */
        .hero-banner {
            position: relative;
            width: 100%;
            height: 80vh; /* Баннер займет 80% высоты экрана */
            min-height: 400px;
            /* Замените URL ниже на ссылку на ваше фото */
            background-image: url('https://sun9-36.vkuserphoto.ru/s/v1/ig2/FDkhHWQLz0H6QRZ_PSiMUix26wF0wQLAEe5mIW1Ux544ntxgJRKpbN7i8QbdJ0RaD7Us94MaqAcFfHYKCJoFaI1c.jpg?quality=95&as=32x18,48x27,72x41,108x62,160x92,240x137,360x206,480x275,540x309,640x366,720x412,1080x618,1212x694&from=bu&cs=1212x0');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Темный фильтр поверх фото, чтобы текст лучше читался */
        .hero-banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4); /* 40% затемнения */
            z-index: 1;
        }

        /* Контент баннера */
        .banner-content {
            position: relative;
            z-index: 2; /* Поднимаем текст над темным фильтром */
            text-align: center;
            color: #ffffff;
            padding: 0 20px;
            max-width: 800px;
        }

        /* Заголовок */
        .banner-title {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6);
        }

        /* Подзаголовок */
        .banner-subtitle {
            font-size: 1.25rem;
            margin-bottom: 40px;
            line-height: 1.6;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.6);
        }

        /* Кнопка */
        .banner-btn {
            display: inline-block;
            padding: 15px 35px;
            font-size: 1rem;
            font-weight: 600;
            color: #ffffff;
            background-color: #ff4757; /* Яркий цвет кнопки */
            border: none;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
        }

        /* Эффект при наведении на кнопку */
        .banner-btn:hover {
            background-color: #ff6b81;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 71, 87, 0.6);
        }

        /* Адаптивность для мобильных устройств */
        @media (max-width: 768px) {
            .banner-title {
                font-size: 2rem;
            }
            .banner-subtitle {
                font-size: 1rem;
            }
            .hero-banner {
                height: 60vh;
            }
        }
    </style>
</head>
<body>

    <section class="hero-banner">
        <div class="banner-content">
            <h1 class="banner-title">Ваша идеальная поездка</h1>
            <p class="banner-subtitle">Откройте для себя невероятные места и получите незабываемые эмоции уже в этом сезоне.</p>
            <a href="#" class="banner-btn">Узнать больше</a>
        </div>
    </section>

</body>
</html>
