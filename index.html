<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фото-баннер со скроллом</title>
    <style>
        /* Включаем плавную прокрутку для всей страницы */
        html {
            scroll-behavior: smooth;
        }

        /* Обнуляем базовые отступы */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Контейнер баннера */
        .hero-banner {
            position: relative;
            width: 100%;
            height: 100vh; /* Сделали баннер на весь экран, чтобы скролл вниз имел явный смысл */
            min-height: 500px;
            
            /* Ваша ссылка на фото */
            background-image: url('https://sun9-36.vkuserphoto.ru/s/v1/ig2/FDkhHWQLz0H6QRZ_PSiMUix26wF0wQLAEe5mIW1Ux544ntxgJRKpbN7i8QbdJ0RaD7Us94MaqAcFfHYKCJoFaI1c.jpg?quality=95&as=32x18,48x27,72x41,108x62,160x92,240x137,360x206,480x275,540x309,640x366,720x412,1080x618,1212x694&from=bu&cs=1212x0');
            
            background-size: cover; /* Для полноэкранного баннера cover подходит лучше, чтобы не было пустых полей */
            background-position: center;
            background-repeat: no-repeat;
            
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Темный фильтр поверх фото, чтобы текст лучше читался */
        .hero-banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4); /* 40% затемнения */
            z-index: 1;
        }

        /* Контент баннера */
        .banner-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: #ffffff;
            padding: 0 20px;
            max-width: 800px;
            margin-bottom: 50px; /* Оставляем место внизу для иконки мышки */
        }

        /* Заголовок */
        .banner-title {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6);
        }

        /* Подзаголовок */
        .banner-subtitle {
            font-size: 1.25rem;
            margin-bottom: 30px;
            line-height: 1.5;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.6);
        }

        /* Кнопка */
        .banner-btn {
            display: inline-block;
            padding: 12px 35px;
            font-size: 1rem;
            font-weight: 600;
            color: #ffffff;
            background-color: #ff4757; 
            border: none;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
        }

        .banner-btn:hover {
            background-color: #ff6b81;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 71, 87, 0.6);
        }

        /* Анимированный индикатор мышки для скролла */
        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.3s;
        }

        .scroll-indicator:hover {
            color: #ffffff;
        }

        /* Корпус мышки */
        .mouse {
            width: 26px;
            height: 42px;
            border: 2px solid currentColor;
            border-radius: 20px;
            position: relative;
            margin-bottom: 8px;
        }

        /* Колёсико мышки и его анимация */
        .wheel {
            width: 4px;
            height: 8px;
            background-color: currentColor;
            border-radius: 2px;
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            animation: scroll-wheel 1.6s infinite ease-in-out;
        }

        /* Анимация движения колёсика вниз */
        @keyframes scroll-wheel {
            0% {
                top: 8px;
                opacity: 1;
            }
            50% {
                top: 18px;
                opacity: 0.3;
            }
            100% {
                top: 8px;
                opacity: 1;
            }
        }

        /* Секция контента под баннером (куда будет идти прокрутка) */
        .main-content {
            padding: 80px 20px;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
            background: #f9f9f9;
        }

        .main-content h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #2f3542;
        }

        .main-content p {
            font-size: 1.1rem;
            color: #57606f;
            line-height: 1.6;
        }

        /* Адаптивность для мобильных устройств */
        @media (max-width: 768px) {
            .hero-banner {
                height: 100vh; /* На смартфонах баннер тоже займет весь экран */
                min-height: 450px;
            }
            .banner-title {
                font-size: 1.8rem;
                margin-bottom: 10px;
            }
            .banner-subtitle {
                font-size: 1rem;
                margin-bottom: 20px;
            }
            .banner-btn {
                padding: 10px 25px;
                font-size: 0.9rem;
            }
            .mouse {
                width: 22px;
                height: 36px;
            }
            .scroll-indicator {
                bottom: 20px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>

    <section class="hero-banner">
    <div class="banner-content">
        <h1 class="banner-title"></h1>
        <p class="banner-subtitle"></p>
        <a href="#year-2025-2026" class="banner-btn">2025/2026 год</a>
    </div>

    <a href="#next-section" class="scroll-indicator" aria-label="Прокрутить вниз">
        <div class="mouse">
            <div class="wheel"></div>
        </div>
        <span>Листайте вниз</span>
    </a>
</section>

<section id="next-section" class="main-content">
    <h2>Добро пожаловать в путешествие</h2>
    <p>Здесь начинается основной контент вашего сайта. При прокрутке колёсиком мыши, свайпом на телефоне или при клике на кнопку «Листайте вниз» страница плавно переместится к этой текстовой секции.</p>
</section>

    
</body>
</html>
