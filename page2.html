<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сезон 2025/2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f1f2f6;
            color: #2f3542;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            color: #ff4757;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.1rem;
            color: #57606f;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Стильная кнопка Назад */
        .back-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 600;
            color: #2f3542;
            background-color: #e4e7eb;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background-color: #d2d6dc;
            transform: translateX(-5px); /* Кнопка слегка сдвигается влево при наведении */
        }

        /* Оптимизация под мобильные экраны */
        @media (max-width: 768px) {
            .container {
                padding: 25px 20px;
            }
            h1 {
                font-size: 1.8rem;
            }
            p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Сезон 2025/2026</h1>
        <p>Вы успешно перешли на новую страницу сайта! Здесь вы можете разместить подробную информацию о турах, расписании или предложениях на новый сезон.</p>
        
        <a href="index.html" class="back-btn">← Назад на главную</a>
    </div>

</body>
</html>
